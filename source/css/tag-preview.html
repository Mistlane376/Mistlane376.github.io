<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>侧边栏标签样式预览</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .preview-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      max-width: 400px;
      width: 100%;
    }

    .preview-header {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      padding: 20px;
      text-align: center;
      font-weight: 600;
      color: #333;
    }

    .card-widget.card-info {
      border-radius: 14px;
      transition: all 0.3s ease;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.07);
      overflow: hidden;
      background: linear-gradient(180deg,
          rgba(255, 255, 255, 0.95) 0%,
          rgba(255, 255, 255, 0.85) 100%);
      padding: 30px 20px;
      text-align: center;
    }

    .avatar-img {
      margin: 20px auto;
    }

    .avatar-img img {
      border-radius: 50%;
      border: 3px solid #eab308;
      padding: 3px;
      background: #fff;
      box-shadow: 0 0 0 6px rgba(234, 179, 8, 0.10);
      transition: all 0.4s ease;
      width: 100px;
      height: 100px;
      object-fit: cover;
    }

    .author-info-name {
      font-size: 1.15rem;
      font-weight: 700;
      color: #3d3226;
      margin: 10px 0 8px;
      letter-spacing: 0.5px;
    }

    .author-info-description {
      font-size: 0.82rem;
      line-height: 1.75;
      color: #6b5840;
      padding: 0 14px;
      text-align: center;
    }

    /* 标签容器 */
    .author-tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
      padding: 0 4px;
    }

    /* 单个标签 */
    .author-tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #eab308 0%, #f59e0b 100%);
      border-radius: 20px;
      box-shadow: 0 2px 8px rgba(234, 179, 8, 0.25);
      transition: all 0.3s ease;
      cursor: default;
      letter-spacing: 0.3px;
      position: relative;
      overflow: hidden;
    }

    /* 标签悬停效果 */
    .author-tag:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 4px 12px rgba(234, 179, 8, 0.35);
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    }

    /* 为不同标签添加不同的渐变色 */
    .author-tag:nth-child(1) {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
    }

    .author-tag:nth-child(1):hover {
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    }

    .author-tag:nth-child(2) {
      background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
      box-shadow: 0 2px 8px rgba(139, 92, 246, 0.3);
    }

    .author-tag:nth-child(2):hover {
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
    }

    .author-tag:nth-child(3) {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
    }

    .author-tag:nth-child(3):hover {
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
    }

    /* 标签光泽效果 */
    .author-tag::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg,
        transparent,
        rgba(255, 255, 255, 0.2),
        transparent);
      transition: left 0.5s ease;
    }

    .author-tag:hover::before {
      left: 100%;
    }

    .site-data {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 16px 12px;
      padding: 12px 0;
      border-top: 1px solid rgba(180, 160, 130, 0.2);
      border-bottom: 1px solid rgba(180, 160, 130, 0.2);
    }

    .site-data a {
      flex: 1;
      text-align: center;
      text-decoration: none;
      padding: 6px 0;
      border-radius: 10px;
      transition: all 0.25s ease;
      color: inherit;
    }

    .site-data a:hover {
      background: rgba(234, 179, 8, 0.08);
      transform: translateY(-2px);
      box-shadow: 0 2px 8px rgba(234, 179, 8, 0.12);
    }

    .site-data .headline {
      font-size: 0.7rem;
      color: #999;
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .site-data .length-num {
      font-size: 1.25rem;
      font-weight: 700;
      color: #eab308;
      line-height: 1.4;
    }

    .preview-footer {
      background: #f5f5f5;
      padding: 15px;
      text-align: center;
      font-size: 0.85rem;
      color: #666;
    }

    .preview-footer code {
      background: #e8e8e8;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      color: #c7254e;
    }
  </style>
</head>
<body>
  <div class="preview-container">
    <div class="preview-header">🎨 侧边栏标签样式预览</div>

    <div class="card-widget card-info">
      <div class="avatar-img">
        <img src="https://via.placeholder.com/100x100/eab308/ffffff?text=Avatar" alt="avatar">
      </div>

      <div class="author-info-name">Mistlane376</div>

      <div class="author-info-description">
        齐鲁工业大学 · 计算机科学与技术 | 算法竞赛选手 (ACMer)

        <div class="author-tags">
          <span class="author-tag">#C++</span>
          <span class="author-tag">#算法竞赛</span>
          <span class="author-tag">#数据结构</span>
        </div>
      </div>

      <div class="site-data">
        <a href="#">
          <div class="headline">文章</div>
          <div class="length-num">12</div>
        </a>
        <a href="#">
          <div class="headline">标签</div>
          <div class="length-num">8</div>
        </a>
        <a href="#">
          <div class="headline">分类</div>
          <div class="length-num">5</div>
        </a>
      </div>
    </div>

    <div class="preview-footer">
      💡 将鼠标悬停在标签上查看动画效果<br>
      <code>hexo s</code> 启动本地服务器预览
    </div>
  </div>
</body>
</html>
